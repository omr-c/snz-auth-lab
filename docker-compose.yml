version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: snz-db
    environment:
      - POSTGRES_USER=esenezeta
      - POSTGRES_PASSWORD=Esenezeta2026
      - POSTGRES_DB=lab_security_db
    ports:
      - "5432:5432"
    networks:
      - snz-network

  api:
    image: lab-security-jwt-api:latest
    container_name: lab-security-jwt-api-1
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/lab_security_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=Esenezeta2026
      - SECURITY_JWT_SECRET_KEY=esta_es_una_llave_maestra_snz_2026_muy_segura_y_larga
      - SECURITY_JWT_EXPIRATION_TIME=3600000 # 1 hora
    networks:
      - snz-network

networks:
  snz-network:
    driver: bridge
